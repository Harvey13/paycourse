<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2"/>
      <stop offset="100%" style="stop-color:#2c5aa0"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f4a300"/>
    </linearGradient>
  </defs>
  
  <!-- Cercle de fond -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Livre ouvert -->
  <path d="M 120 180 Q 256 160 256 200 L 256 380 Q 256 340 120 360 Z" 
        fill="#ffffff" opacity="0.95"/>
  <path d="M 392 180 Q 256 160 256 200 L 256 380 Q 256 340 392 360 Z" 
        fill="#ffffff" opacity="0.85"/>
  
  <!-- Lignes du livre -->
  <line x1="150" y1="220" x2="230" y2="215" stroke="#4a90e2" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="250" x2="230" y2="245" stroke="#4a90e2" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="280" x2="230" y2="275" stroke="#4a90e2" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Pièce de monnaie -->
  <circle cx="340" cy="260" r="50" fill="url(#coin)" stroke="#b8860b" stroke-width="3"/>
  <text x="340" y="280" font-family="Arial, sans-serif" font-size="50" 
        font-weight="bold" fill="#b8860b" text-anchor="middle">€</text>
  
  <!-- Coche de validation -->
  <circle cx="380" cy="150" r="35" fill="#4caf50"/>
  <path d="M 365 150 L 378 163 L 398 140" stroke="white" stroke-width="6" 
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>